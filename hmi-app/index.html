<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <!-- Static dark fallback — parsed before any JS, guarantees no white flash on load -->
  <style>
    html, body, #root, canvas { background-color: #05070a }
  </style>
  <!-- Define --color-industrial-bg early (persisted or default) so any var() ref resolves immediately -->
  <script>
    (function(){try{var c=JSON.parse(localStorage.getItem('hmi-theme-colors')||'{}');var bg=c['--color-industrial-bg']||'#05070a';var s=document.documentElement.style;s.setProperty('--color-industrial-bg',bg);s.backgroundColor=bg}catch(e){}})();
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <title>Interfaz Laboratorio</title>
</head>

  <body>
  <!-- Gradient definitions for SVG icons -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden;">
    <defs>
      <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#A78BFA" />
        <stop offset="100%" stop-color="#22d3ee" />
      </linearGradient>
    </defs>
  </svg>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
